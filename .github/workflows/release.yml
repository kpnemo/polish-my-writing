# Build, sign, notarize, staple, and publish the DMG to a GitHub Release.
#
# Trigger: push a tag like `v1.0.0`, or run manually (workflow_dispatch).
#
# One-time setup — add these repository secrets (Settings → Secrets and variables
# → Actions). You already have all of these from the Apple Developer account used
# for the iOS app (Team R5QHA2A8Z9):
#
#   DEVELOPER_ID_CERT_P12_BASE64  Base64 of your "Developer ID Application" cert
#                                 exported as .p12 (incl. private key).
#                                 Export from Keychain Access -> right-click the
#                                 identity -> Export -> .p12, then:
#                                   base64 -i cert.p12 | pbcopy
#   DEVELOPER_ID_CERT_PASSWORD    The password you set when exporting the .p12.
#   ASC_KEY_P8_BASE64             Base64 of your App Store Connect API key, e.g.
#                                   base64 -i AuthKey_XXXXXXXXXX.p8 | pbcopy
#   ASC_KEY_ID                    The key id, e.g. XXXXXXXXXX
#   ASC_ISSUER_ID                 The issuer UUID (App Store Connect -> Users and
#                                 Access -> Integrations -> Keys).
#
# Security note: all secrets are passed via `env:` and quoted in `run:`; no
# untrusted event data is interpolated into shell commands.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload the DMG

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install xcodegen create-dmg

      - name: Import Developer ID certificate into a temporary keychain
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KCPW="$(openssl rand -base64 24)"
          printf '%s' "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KEYCHAIN"
          # Make the build keychain searchable so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" "$(security default-keychain -d user | tr -d ' \"')"
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning | grep "Developer ID Application"

      - name: Build, sign, notarize, staple
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          printf '%s' "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/asc.p8"
          NOTARY_KEY="$RUNNER_TEMP/asc.p8" \
          NOTARY_KEY_ID="$ASC_KEY_ID" \
          NOTARY_ISSUER="$ASC_ISSUER_ID" \
            bash scripts/release.sh
          rm -f "$RUNNER_TEMP/asc.p8"

      - name: Publish DMG to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "build/Polish My Writing.dmg"
          draft: true                  # review, then publish from the Releases tab
          generate_release_notes: true
